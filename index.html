<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CloudSim | Intelligent Resource Allocator</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { mono:['JetBrains Mono','monospace'], syne:['Syne','sans-serif'] },
      colors: {
        brand:{ 50:'#edfcf9',100:'#d2f9f2',200:'#a8f1e6',300:'#71e4d5',400:'#38cec0',500:'#1ab3a7',600:'#128f87',700:'#11726d',800:'#125b58',900:'#134c49' },
        dark:{ 900:'#060b14',800:'#0c1422',700:'#111d30',600:'#172540',500:'#1e3054' }
      }
    }
  }
}
</script>
<style>
*,body{margin:0;padding:0;box-sizing:border-box}
body{background:#060b14;font-family:'Syne',sans-serif;color:#e2e8f0;overflow-x:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#0c1422}::-webkit-scrollbar-thumb{background:#1ab3a7;border-radius:9px}
.glass{background:rgba(17,29,48,0.7);backdrop-filter:blur(12px);border:1px solid rgba(26,179,167,0.15)}
.glow{box-shadow:0 0 30px rgba(26,179,167,0.15)}.glow-sm{box-shadow:0 0 12px rgba(26,179,167,0.2)}
.grid-bg{background-image:linear-gradient(rgba(26,179,167,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(26,179,167,0.04) 1px,transparent 1px);background-size:40px 40px}
@keyframes slide-in{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes ping-slow{0%{transform:scale(1);opacity:1}100%{transform:scale(1.8);opacity:0}}
@keyframes spin{to{transform:rotate(360deg)}}
.anim-in{animation:slide-in 0.3s ease forwards}
.live-dot::before{content:'';display:inline-block;width:8px;height:8px;background:#1ab3a7;border-radius:50%;margin-right:6px;animation:ping-slow 1.5s infinite}
input,select{background:#0c1422!important;border:1px solid rgba(26,179,167,0.25)!important;color:#e2e8f0!important;border-radius:6px;padding:8px 12px;width:100%;outline:none;font-family:'Syne',sans-serif}
input:focus,select:focus{border-color:#1ab3a7!important;box-shadow:0 0 0 2px rgba(26,179,167,0.2)!important}
.btn-primary{background:linear-gradient(135deg,#1ab3a7,#128f87);color:#fff;border:none;padding:10px 22px;border-radius:6px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:700;transition:all .2s}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(26,179,167,0.4)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-ghost{background:transparent;border:1px solid rgba(26,179,167,0.3);color:#1ab3a7;padding:8px 18px;border-radius:6px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
.btn-ghost:hover{background:rgba(26,179,167,0.1)}
.btn-danger{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:6px 14px;border-radius:6px;cursor:pointer;font-family:'Syne',sans-serif;transition:all .2s}
.btn-danger:hover{background:rgba(239,68,68,0.25)}
.tag{display:inline-block;padding:2px 10px;border-radius:99px;font-size:11px;font-weight:700;font-family:'JetBrains Mono',monospace}
.tag-green{background:rgba(26,179,167,0.15);color:#1ab3a7;border:1px solid rgba(26,179,167,0.3)}
.tag-yellow{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.tag-red{background:rgba(239,68,68,0.15);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.tag-blue{background:rgba(96,165,250,0.15);color:#60a5fa;border:1px solid rgba(96,165,250,0.3)}
.nav-item{padding:10px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;transition:all .2s;color:#94a3b8}
.nav-item:hover{background:rgba(26,179,167,0.08);color:#e2e8f0}
.nav-item.active{background:rgba(26,179,167,0.12);color:#1ab3a7;border-left:2px solid #1ab3a7}
.modal-bg{position:fixed;inset:0;background:rgba(6,11,20,0.85);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.stat-card{position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:-50%;right:-50%;width:100%;height:100%;background:radial-gradient(circle,rgba(26,179,167,0.06) 0%,transparent 70%)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:700;color:#4a6fa5;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid rgba(26,179,167,0.1)}
td{padding:12px 14px;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04)}
tr:hover td{background:rgba(26,179,167,0.04)}
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:#4a6fa5;gap:10px}
.spinner{width:20px;height:20px;border:2px solid rgba(26,179,167,0.2);border-top-color:#1ab3a7;border-radius:50%;animation:spin .7s linear infinite}
.overflow-x-auto{overflow-x:auto}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="/app.jsx"></script>
</body>
</html>
